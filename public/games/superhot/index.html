<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperHot (Local)</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #gameContainer {
      width: 100%;
      height: 100%;
      position: relative;
      background: #000;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      touch-action: none;
    }

    #status {
      position: absolute;
      inset: auto 12px 12px 12px;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      padding: 8px 10px;
      font: 600 12px/1.4 system-ui, sans-serif;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="canvas"></canvas>
    <div id="status">Cargando SuperHot local…</div>
  </div>

  <script>
    var statusNode = document.getElementById("status");
    var Module = {
      dataUrl: "webgl.data",
      codeUrl: "webgl.js",
      memUrl: "webgl.mem",
      TOTAL_MEMORY: 268435456,
      compatibilitycheck: null,
      setStatus: function (text) {
        if (statusNode) statusNode.textContent = text || "";
      },
      errorhandler: function (message) {
        if (statusNode) {
          statusNode.textContent = "Error cargando SuperHot local. Revisa games/superhot/README.md";
        }
        console.error(message);
      }
    };

    (function loadLocalUnityLoader() {
      var script = document.createElement("script");
      script.src = "webgl.loader.js";
      script.onerror = function () {
        Module.errorhandler("No se encontró games/superhot/webgl.loader.js");
      };
      document.body.appendChild(script);
    })();
  </script>

  <script src="../../classroom-hotkey.js"></script>
</body>
</html>
