<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Juega Rocket Goal desde Budsin Games.">
  <title>Rocket Goal | Budsin Games</title>
  <link rel="icon" href="images.jpeg">
  <style>
    :root {
      --bg: #11151d;
      --panel: rgba(15, 20, 30, 0.92);
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef6ff;
      --muted: #b5c4d6;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(84, 160, 255, 0.16), transparent 18%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 14%),
        linear-gradient(180deg, #090c12 0%, #11151d 100%);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 12px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
    }

    .title strong {
      display: block;
      font-size: clamp(1.35rem, 3vw, 2rem);
      margin-bottom: 6px;
    }

    .title span {
      color: var(--muted);
      line-height: 1.6;
    }

    .back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--line);
      font-weight: 700;
      white-space: nowrap;
    }

    .frame-shell {
      flex: 1;
      margin: 0 12px 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .launcher {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #274e13;
      color: var(--text);
    }

    .button-wrapper {
      width: min(560px, calc(100% - 32px));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 24px;
      text-align: center;
    }

    .logo-text {
      font-size: clamp(2rem, 5vw, 2.7rem);
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .button-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .c-button {
      min-height: 56px;
      appearance: none;
      border: 2px solid rgba(0, 0, 0, 0.18);
      border-radius: 10px;
      color: #fff;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: #6aa84f;
    }

    .btn-primary:hover {
      background: #84bb66;
      border-color: #9fd48a;
      transform: translateY(-2px);
    }

    .btn-alt {
      background: #073763;
    }

    .btn-alt:hover {
      background: #2e6aa3;
      border-color: #6f9ac4;
      transform: translateY(-2px);
    }

    .launcher-note {
      color: rgba(255, 255, 255, 0.84);
      line-height: 1.5;
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .button-grid {
        grid-template-columns: 1fr;
      }
    }

    #game-frame {
      display: none;
    }
  </style>
</head>
<body>
  <main class="frame-shell">
    <div id="launcher" class="launcher">
      <div class="button-wrapper">
        <div class="logo-text">Budsin Games</div>
        <div class="button-grid">
          <button class="c-button btn-primary" type="button" onclick="loadGame('https://script.google.com/macros/s/AKfycbybZkVPGyvHUOZbwrJSn5fRQIFcGpoIEhp0r-yq2GWRtE_1G7YzP4t8kPZRfp6tutUN/exec')">PLAY HERE</button>
          <a class="c-button btn-primary" href="https://script.google.com/macros/s/AKfycbybZkVPGyvHUOZbwrJSn5fRQIFcGpoIEhp0r-yq2GWRtE_1G7YzP4t8kPZRfp6tutUN/exec" target="_blank" rel="noopener">FULLSCREEN</a>
          <button class="c-button btn-alt" type="button" onclick="loadGame('https://script.google.com/macros/s/AKfycbybZkVPGyvHUOZbwrJSn5fRQIFcGpoIEhp0r-yq2GWRtE_1G7YzP4t8kPZRfp6tutUN/exec')">PLAY HERE (Alt)</button>
          <a class="c-button btn-alt" href="https://script.google.com/macros/s/AKfycbybZkVPGyvHUOZbwrJSn5fRQIFcGpoIEhp0r-yq2GWRtE_1G7YzP4t8kPZRfp6tutUN/exec" target="_blank" rel="noopener">FULLSCREEN (Alt)</a>
        </div>
        <div class="launcher-note">Dejé el launcher estable. Si una opción no te va bien, prueba la otra.</div>
      </div>
    </div>
    <iframe
      id="game-frame"
      title="Rocket Goal"
      allow="autoplay; fullscreen; camera; focus-without-user-activation *; monetization; gamepad; keyboard-map *; xr-spatial-tracking; clipboard-write; web-share; accelerometer; magnetometer; gyroscope; display-capture"
      sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-scripts allow-same-origin allow-downloads"
      scrolling="no"
      allowfullscreen
    ></iframe>
  </main>

  <header class="topbar">
    <div class="title">
      <strong>Rocket Goal</strong>
      <span>Conduce, acelera y marca goles con coches impulsados por cohetes desde su propia página dedicada.</span>
    </div>
    <a class="back" href="index.html">Volver al index</a>
  </header>

  <script>
    function loadGame(url) {
      var launcher = document.getElementById("launcher");
      var frame = document.getElementById("game-frame");
      frame.src = url;
      frame.style.display = "block";
      launcher.style.display = "none";
    }
  </script>
  <script src="classroom-hotkey.js"></script>
</body>
</html>
