<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Juega Snow Rider desde Budsin Games.">
  <title>Snow Rider | Budsin Games</title>
  <link rel="icon" href="images.jpeg">
  <style>
    :root {
      --bg: #11151d;
      --panel: rgba(15, 20, 30, 0.92);
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef6ff;
      --muted: #b5c4d6;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(152, 216, 255, 0.18), transparent 18%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 14%),
        linear-gradient(180deg, #090c12 0%, #11151d 100%);
    }

    .frame-shell {
      width: min(1100px, calc(100% - 24px));
      aspect-ratio: 1.39 / 1;
      flex: none;
      margin: 0 auto 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 12px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
    }

    .title strong {
      display: block;
      font-size: clamp(1.35rem, 3vw, 2rem);
      margin-bottom: 6px;
    }

    .title span {
      color: var(--muted);
      line-height: 1.6;
    }

    .back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--line);
      font-weight: 700;
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      .frame-shell {
        width: calc(100% - 24px);
        aspect-ratio: auto;
        min-height: 62vh;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="frame-shell">
    <iframe
      src="https://script.google.com/macros/s/AKfycbw5Z-Ryg_JfIIDYH7pzzPKXlr2tN0HCw-tT_ZvxBGDPsDDY41ewPVneVeLzelfpnBab/exec"
      title="Snow Rider"
      allow="autoplay; fullscreen; camera; focus-without-user-activation *; monetization; gamepad; keyboard-map *; xr-spatial-tracking; clipboard-write; web-share; accelerometer; magnetometer; gyroscope; display-capture"
      sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-scripts allow-same-origin allow-downloads"
      scrolling="no"
      allowfullscreen
    ></iframe>
  </main>

  <header class="topbar">
    <div class="title">
      <strong>Snow Rider</strong>
      <span>Deslízate por la nieve, esquiva obstáculos y aguanta lo máximo posible en su propia página dedicada.</span>
    </div>
    <a class="back" href="index.html">Volver al index</a>
  </header>
  <script src="classroom-hotkey.js"></script>
</body>
</html>
