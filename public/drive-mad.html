<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Juega Drive Mad desde Budsin Games.">
  <title>Drive Mad | Budsin Games</title>
  <link rel="icon" href="images.jpeg">
  <style>
    :root {
      --bg: #11151d;
      --panel: rgba(15, 20, 30, 0.92);
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef6ff;
      --muted: #b5c4d6;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 162, 90, 0.16), transparent 18%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 14%),
        linear-gradient(180deg, #090c12 0%, #11151d 100%);
    }

    .frame-shell {
      flex: 1;
      margin: 12px 12px 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 12px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
    }

    .title strong {
      display: block;
      font-size: clamp(1.35rem, 3vw, 2rem);
      margin-bottom: 6px;
    }

    .title span {
      color: var(--muted);
      line-height: 1.6;
    }

    .back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--line);
      font-weight: 700;
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="frame-shell">
    <iframe
      src="https://drivemad3.io/drive-mad.embed"
      title="Drive Mad"
      scrolling="no"
      allowfullscreen
    ></iframe>
  </main>

  <header class="topbar">
    <div class="title">
      <strong>Drive Mad</strong>
      <span>Controla un vehículo inestable, supera obstáculos absurdos y termina cada nivel sin volcar.</span>
    </div>
    <a class="back" href="index.html">Volver al index</a>
  </header>
  <script src="classroom-hotkey.js"></script>
</body>
</html>
