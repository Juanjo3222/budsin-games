<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Juega Among Us desde Budsin Games.">
  <title>Among Us | Budsin Games</title>
  <link rel="icon" href="images.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #edf1f5;
      --bg-2: #dfe6ee;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: rgba(255, 255, 255, 0.96);
      --line: rgba(18, 24, 38, 0.1);
      --text: #111827;
      --muted: #5c6678;
      --red: #ef3f45;
      --blue: #2daeff;
      --yellow: #ffd84a;
      --shadow: 0 24px 64px rgba(15, 23, 42, 0.12);
      --shadow-soft: 0 16px 36px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 24px 0 32px;
      font-family: "Sora", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(255, 216, 74, 0.34), transparent 26%),
        linear-gradient(180deg, #f7fafc 0%, var(--bg) 48%, var(--bg-2) 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      top: 24px;
      bottom: 24px;
      width: clamp(16px, 3vw, 36px);
      border-radius: 999px;
      opacity: 0.95;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      left: 14px;
      background: linear-gradient(180deg, #ff686e 0%, var(--red) 100%);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.35);
    }

    body::after {
      right: 14px;
      background: linear-gradient(180deg, #63d4ff 0%, var(--blue) 100%);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.35);
    }

    body > .topbar,
    body > .frame-shell,
    body > #unity-container,
    body > #loading-panel,
    body > .note {
      width: min(1320px, calc(100% - 88px));
      margin-left: auto;
      margin-right: auto;
      position: relative;
      z-index: 1;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1320px, calc(100% - 88px));
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      flex: 1;
    }

    .topbar {
      order: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 34px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(246, 249, 252, 0.88)),
        linear-gradient(135deg, rgba(239, 63, 69, 0.08), rgba(45, 174, 255, 0.08));
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .title {
      flex: 1;
    }

    .title::before {
      content: "Budsin Portal";
      display: inline-flex;
      margin-bottom: 10px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.06);
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .title strong {
      display: block;
      margin-bottom: 6px;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
    }

    .title span {
      display: block;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.98rem;
      max-width: 58rem;
    }

    .back,
    .c-button,
    .player-overlay__start {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 20px;
      border-radius: 18px;
      border: 0;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .back,
    .btn-primary,
    .player-overlay__start {
      background: linear-gradient(135deg, #ef3f45, #ff8c55);
      color: #fff;
      box-shadow: 0 18px 34px rgba(239, 63, 69, 0.24);
    }

    .btn-alt {
      background: linear-gradient(135deg, #111827, #1f2937);
      color: #fff;
      box-shadow: var(--shadow-soft);
    }

    .back:hover,
    .c-button:hover,
    .player-overlay__start:hover {
      transform: translateY(-2px);
      filter: brightness(1.02);
    }

    .frame-shell,
    #unity-container,
    #c2canvasdiv {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 34px;
      background: #030712;
      box-shadow: var(--shadow);
    }

    body > .frame-shell,
    body > #unity-container {
      order: 3;
      flex: 1;
      min-height: clamp(420px, 68vh, 860px);
    }

    .shell .frame-shell {
      order: 2;
      flex: 1;
      min-height: clamp(420px, 68vh, 860px);
      margin: 0;
    }

    .game-shell {
      order: 2;
      display: flex;
      flex: 1;
      min-height: clamp(420px, 68vh, 860px);
    }

    .game-shell > * {
      flex: 1;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: clamp(420px, 68vh, 860px);
      border: 0;
      background: #000;
    }

    #unity-canvas,
    #c2canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      border: 0;
      background: #000;
    }

    #c2canvasdiv {
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
    }

    .note,
    #loading-panel {
      order: 3;
      padding: 18px 20px;
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow-soft);
    }

    .note {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.75;
    }

    #loading-panel {
      order: 2;
      text-align: center;
      color: var(--text);
    }

    #loading-kicker {
      margin-bottom: 10px;
      color: var(--red);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #loading-text {
      margin: 0;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.4rem, 6vw, 4.4rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
    }

    #loading-note {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(680px, calc(100% - 60px));
      display: none;
      z-index: 2;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 22px;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    #unity-progress-bar-full {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #ef3f45, #ffb347);
      box-shadow: 0 0 20px rgba(239, 63, 69, 0.36);
    }

    #unity-mobile-warning {
      display: none;
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(17, 24, 39, 0.88);
      color: #fff;
      font-size: 0.9rem;
      z-index: 2;
    }

    .launcher,
    .player-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(3, 7, 18, 0.34) 0%, rgba(3, 7, 18, 0.86) 100%);
      color: #fff;
    }

    .button-wrapper,
    .player-overlay {
      flex-direction: column;
      gap: 18px;
      text-align: center;
    }

    .button-wrapper {
      width: min(640px, calc(100% - 8px));
      padding: 26px;
      border-radius: 30px;
      background: rgba(17, 24, 39, 0.3);
      backdrop-filter: blur(8px);
    }

    .logo-text,
    .player-overlay-name {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      letter-spacing: 0.04em;
      line-height: 0.95;
    }

    .button-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .launcher-note {
      color: rgba(255, 255, 255, 0.82);
      line-height: 1.7;
    }

    .player-overlay img {
      width: min(520px, 100%);
      max-height: 48vh;
      object-fit: cover;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    #game-frame {
      display: none;
    }

    @media (max-width: 920px) {
      body::before,
      body::after {
        display: none;
      }

      body > .topbar,
      body > .frame-shell,
      body > #unity-container,
      body > #loading-panel,
      body > .note,
      .shell {
        width: min(100%, calc(100% - 28px));
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .back {
        width: 100%;
      }
    }

    @media (max-width: 720px) {
      body {
        gap: 14px;
        padding-top: 16px;
      }

      .topbar,
      .note,
      #loading-panel {
        padding: 18px;
        border-radius: 26px;
      }

      .frame-shell,
      #unity-container,
      #c2canvasdiv {
        border-radius: 28px;
      }

      iframe,
      .game-shell,
      body > .frame-shell,
      body > #unity-container,
      .shell .frame-shell {
        min-height: 460px;
      }

      .button-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="frame-shell">
    <iframe
      src="https://buckshotroulettee.github.io/game/among-us/"
      title="Among Us"
      allow="autoplay; fullscreen; camera; focus-without-user-activation *; monetization; gamepad; keyboard-map *; xr-spatial-tracking; clipboard-write; web-share; accelerometer; magnetometer; gyroscope; display-capture"
      sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-scripts allow-same-origin allow-downloads"
      scrolling="no"
      allowfullscreen
    ></iframe>
  </main>

  <header class="topbar">
    <div class="title">
      <strong>Among Us</strong>
      <span>Descubre al impostor o sabotea a la tripulación desde su propia página dedicada.</span>
    </div>
    <a class="back" href="index.html">Volver al portal</a>
  </header>
  <script src="site-theme.js"></script>
  <script src="classroom-hotkey.js"></script>
</body>
</html>
