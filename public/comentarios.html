<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Comentarios — Budsin Games" />
        <title>Comentarios · Budsin Games</title>
        <link rel="icon" type="image/jpeg" href="https://budsin-games.pages.dev/images.jpeg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@400;500;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #edf1f5;
                --bg-2: #dfe6ee;
                --surface: rgba(255, 255, 255, 0.92);
                --surface-strong: #ffffff;
                --line: rgba(18, 24, 38, 0.1);
                --text: #111827;
                --muted: #5c6678;
                --red: #ef3f45;
                --blue: #2daeff;
                --shadow: 0 24px 64px rgba(15, 23, 42, 0.12);
                --shadow-soft: 0 16px 36px rgba(15, 23, 42, 0.08);
            }

            * { box-sizing: border-box; }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: "Sora", sans-serif;
                color: var(--text);
                background:
                    radial-gradient(circle at top center, rgba(255, 216, 74, 0.34), transparent 26%),
                    linear-gradient(180deg, #f7fafc 0%, var(--bg) 48%, var(--bg-2) 100%);
                overflow-x: hidden;
            }

            body::before,
            body::after {
                content: "";
                position: fixed;
                top: 24px;
                bottom: 24px;
                width: clamp(16px, 3vw, 36px);
                border-radius: 999px;
                opacity: 0.95;
                pointer-events: none;
                z-index: 0;
            }

            body::before {
                left: 14px;
                background: linear-gradient(180deg, #ff686e 0%, var(--red) 100%);
                box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.35);
            }

            body::after {
                right: 14px;
                background: linear-gradient(180deg, #63d4ff 0%, var(--blue) 100%);
                box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.35);
            }

            .shell {
                position: relative;
                z-index: 1;
                width: min(1100px, calc(100% - 88px));
                margin: 0 auto;
                padding: 30px 0 60px;
            }

            .back-link {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 24px;
                padding: 10px 18px;
                border-radius: 999px;
                border: 1px solid var(--line);
                background: var(--surface-strong);
                box-shadow: var(--shadow-soft);
                color: var(--text);
                text-decoration: none;
                font-size: 0.88rem;
                font-weight: 700;
                transition: transform 0.2s ease, box-shadow 0.2s ease;
            }

            .back-link:hover {
                transform: translateY(-2px);
                box-shadow: var(--shadow);
            }

            .page-header {
                padding: 28px 32px;
                border: 1px solid rgba(255, 255, 255, 0.8);
                border-radius: 36px;
                background:
                    linear-gradient(135deg, rgba(255,255,255,0.96), rgba(246,249,252,0.88)),
                    linear-gradient(135deg, rgba(239,63,69,0.08), rgba(45,174,255,0.08));
                box-shadow: var(--shadow);
                margin-bottom: 24px;
                position: relative;
                overflow: hidden;
            }

            .page-header::after {
                content: "";
                position: absolute;
                inset: 20px 20px auto auto;
                width: 160px;
                height: 160px;
                border-radius: 40px;
                background:
                    radial-gradient(circle at 30% 30%, rgba(239,63,69,0.18), transparent 52%),
                    radial-gradient(circle at 70% 70%, rgba(45,174,255,0.16), transparent 46%);
                transform: rotate(14deg);
                opacity: 0.85;
            }

            .page-kicker {
                display: inline-flex;
                margin-bottom: 10px;
                padding: 7px 12px;
                border-radius: 999px;
                background: rgba(239, 63, 69, 0.1);
                color: var(--red);
                font-size: 0.78rem;
                font-weight: 800;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            .page-header h1 {
                margin: 0 0 8px;
                font-family: "Bebas Neue", sans-serif;
                font-size: clamp(3rem, 8vw, 5.5rem);
                line-height: 0.92;
                letter-spacing: 0.04em;
                position: relative;
                z-index: 1;
            }

            .page-header p {
                margin: 0;
                color: var(--muted);
                line-height: 1.7;
                font-size: 0.98rem;
                max-width: 48rem;
                position: relative;
                z-index: 1;
            }

            .padlet-wrapper {
                padding: 24px;
                border: 1px solid rgba(255, 255, 255, 0.8);
                border-radius: 36px;
                background: rgba(255, 255, 255, 0.72);
                box-shadow: var(--shadow);
                backdrop-filter: blur(12px);
            }

            .padlet-wrapper .padlet-embed {
                border-radius: 16px;
                overflow: hidden;
            }

            @media (max-width: 920px) {
                body::before, body::after { display: none; }
                .shell { width: min(100%, calc(100% - 28px)); }
            }

            @media (max-width: 680px) {
                .shell { padding-top: 18px; }
                .page-header { padding: 20px; border-radius: 28px; }
                .padlet-wrapper { padding: 16px; border-radius: 24px; }
            }

            /* ── Dark mode ── */
            html[data-site-theme="dark"] body {
                color: var(--text);
            }

            html[data-site-theme="dark"] .back-link {
                background: rgba(9, 15, 28, 0.92);
                border-color: rgba(148, 163, 184, 0.28);
                color: var(--text);
            }

            html[data-site-theme="dark"] .page-header {
                background: linear-gradient(
                    135deg,
                    rgba(9, 15, 28, 0.96),
                    rgba(15, 23, 42, 0.92)
                );
                border-color: rgba(148, 163, 184, 0.14);
            }

            html[data-site-theme="dark"] .page-header h1 {
                color: #f1f5f9;
            }

            html[data-site-theme="dark"] .page-header p {
                color: #94a3b8;
            }

            html[data-site-theme="dark"] .page-kicker {
                background: rgba(255, 104, 110, 0.15);
                color: var(--red);
            }

            html[data-site-theme="dark"] .padlet-wrapper {
                background: rgba(9, 15, 28, 0.82);
                border-color: rgba(148, 163, 184, 0.14);
            }

            html[data-site-theme="dark"] .padlet-wrapper .padlet-embed {
                border-color: rgba(148, 163, 184, 0.18) !important;
            }
        </style>
    </head>
    <body>
        <main class="shell">
            <a class="back-link" href="index.html">← Volver al portal</a>

            <div class="page-header">
                <span class="page-kicker">Herramientas</span>
                <h1>Comentarios</h1>
                <p>Deja tu opinión, sugerencias o ideas para el portal. Tu voz ayuda a mejorar Budsin Games.</p>
            </div>

            <div class="padlet-wrapper">
                <div class="padlet-embed" style="border:1px solid rgba(0,0,0,0.1);border-radius:2px;box-sizing:border-box;overflow:hidden;position:relative;width:100%;background:#F4F4F4"><p style="padding:0;margin:0"><iframe src="https://padlet.com/embed/nrmo5v8eovoaefgw" frameborder="0" allow="camera;microphone;geolocation;display-capture;clipboard-write" style="width:100%;height:608px;display:block;padding:0;margin:0"></iframe></p><div style="display:flex;align-items:center;justify-content:end;margin:0;padding:8px 8px 8px 0"><a href="https://padlet.com?ref=embed" style="display:flex;align-items:center;gap:5px;flex-grow:0;margin:0;border:none;padding:0;text-decoration:none" target="_blank"><span aria-hidden style="color:#9E9E9E;font-size:10px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;line-height:1">Made with</span><img src="https://padlet.net/emails/padlet_email_logo_2026_text-dark-200.png" height="12" style="padding:0;margin:0;background:0 0;border:none;box-shadow:none;display:block" alt="Hecho con Padlet"></a></div></div>
            </div>
        </main>
        <script src="https://budsin-games.pages.dev/site-theme.js"></script>
        <script src="https://budsin-games.pages.dev/classroom-hotkey.js"></script>
    </body>
</html>
