  <body style="margin: 0;">
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-title">LOADING SUPERHOT...</div>
        <div class="loading-percent" id="loading-percent">0%</div>
        <div class="loading-track">
          <div class="loading-bar" id="loading-bar"></div>
        </div>
      </div>
    </div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    
 <script>
  var Module = {
    TOTAL_MEMORY: 268435456,
    errorhandler: null,
    compatibilitycheck: null,
    dataUrl: "webgl.datagz",
    codeUrl: "webgl.jsgz",
    memUrl: "webgl.memgz"
  };

  const loadingScreen = document.getElementById('loading-screen');
  const loadingPercent = document.getElementById('loading-percent');
  const loadingBar = document.getElementById('loading-bar');

  let progress = 0;
  const progressTimer = window.setInterval(() => {
    progress = Math.min(progress + 2, 90);
    if (loadingBar) loadingBar.style.width = `${progress}%`;
    if (loadingPercent) loadingPercent.textContent = `${progress}%`;
    if (progress >= 90) window.clearInterval(progressTimer);
  }, 120);

  function finishLoading() {
    window.clearInterval(progressTimer);
    if (loadingBar) loadingBar.style.width = '100%';
    if (loadingPercent) loadingPercent.textContent = '100%';
    window.setTimeout(() => loadingScreen?.remove(), 180);
  }

  function failLoading() {
    window.clearInterval(progressTimer);
    if (loadingPercent) loadingPercent.textContent = 'Error al cargar superhot.js';
    if (loadingBar) loadingBar.style.background = '#ef4444';
  }

  const superhotScript = document.createElement('script');
  superhotScript.src = 'https://pkeioxdclksntsdagfxabsxbafwm7osh.ui.nabu.casa/local/superhot.js';
  superhotScript.onload = finishLoading;
  superhotScript.onerror = failLoading;
  document.body.appendChild(superhotScript);

  const canvas = document.getElementById('canvas');

  function resizeCanvas() {
    if (!canvas) return;
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const cssW = window.innerWidth;
    const cssH = window.innerHeight;

    canvas.width = Math.floor(cssW * dpr);
    canvas.height = Math.floor(cssH * dpr);
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
  }

  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', resizeCanvas);
  resizeCanvas();
</script>
