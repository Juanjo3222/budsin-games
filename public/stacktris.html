<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Juega Stacktris desde Budsin Games.">
  <title>Stacktris | Budsin Games</title>
  <link rel="icon" href="images.jpeg">
  <style>
    :root {
      --bg: #11151d;
      --panel: rgba(15, 20, 30, 0.92);
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef6ff;
      --muted: #b5c4d6;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 181, 90, 0.16), transparent 18%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 14%),
        linear-gradient(180deg, #090c12 0%, #11151d 100%);
    }

    .frame-shell {
      position: relative;
      flex: 1;
      margin: 12px 12px 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .player-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(9, 12, 18, 0.36) 0%, rgba(9, 12, 18, 0.86) 100%);
    }

    .player-overlay img {
      width: min(520px, 100%);
      max-height: 48vh;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .player-overlay-name {
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      font-weight: 800;
    }

    .player-overlay__start {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 28px;
      border: 0;
      border-radius: 999px;
      background: #ffb55a;
      color: #0c1118;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 16px 40px rgba(255, 181, 90, 0.3);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 12px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
    }

    .title strong {
      display: block;
      font-size: clamp(1.35rem, 3vw, 2rem);
      margin-bottom: 6px;
    }

    .title span {
      color: var(--muted);
      line-height: 1.6;
    }

    .back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--line);
      font-weight: 700;
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="frame-shell">
    <div id="player-overlay" class="player-overlay">
      <div class="player-overlay-image">
        <img src="https://donotgrowthiswatermelon.com/wp-content/uploads/2024/12/Stacktris.jpg" alt="Stacktris">
      </div>
      <button id="js-player-start" class="player-overlay__start" type="button">Play</button>
      <div class="player-overlay-name">Stacktris</div>
    </div>
    <iframe
      id="game-area"
      src="about:blank"
      title="Stacktris"
      allow="autoplay; fullscreen; camera; focus-without-user-activation *; monetization; gamepad; keyboard-map *; xr-spatial-tracking; clipboard-write; web-share; accelerometer; magnetometer; gyroscope; display-capture"
      sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-scripts allow-same-origin allow-downloads"
      scrolling="no"
      allowfullscreen
    ></iframe>
  </main>

  <header class="topbar">
    <div class="title">
      <strong>Stacktris</strong>
      <span>Apila piezas con cuidado y mantén el equilibrio el mayor tiempo posible desde su propia página dedicada.</span>
    </div>
    <a class="back" href="index.html">Volver al index</a>
  </header>

  <script>
    document.getElementById("js-player-start").addEventListener("click", function () {
      document.getElementById("game-area").src = "https://donotgrowthiswatermelon.com/loader.php?id=5923";
      document.getElementById("player-overlay").style.display = "none";
    });
  </script>
  <script src="classroom-hotkey.js"></script>
</body>
</html>
