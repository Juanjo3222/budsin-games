<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy — Budsin Games</title>
  <link rel="icon" type="image/jpeg" href="https://budsin-games.pages.dev/images.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07090f;
      --surface:   #0e1117;
      --border:    #1c2233;
      --accent:    #4fffb0;
      --accent2:   #00cfff;
      --text:      #e8eaf0;
      --muted:     #555e7a;
      --danger:    #ff4d6a;
      --mono:      'Space Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow-x: hidden;
    }

    /* ── GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .35;
      pointer-events: none;
      z-index: 0;
    }

    /* ── GLOW BLOB ── */
    body::after {
      content: '';
      position: fixed;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse, rgba(79,255,176,.09) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: .1em;
      text-transform: uppercase;
      text-decoration: none;
    }
    .logo-badge::before {
      content: '◈';
      font-size: 14px;
    }

    .header-title {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
      margin-left: auto;
    }

    /* ── MAIN HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 80px;
      gap: 0;
    }

    .tag {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(79,255,176,.3);
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 800;
      line-height: 1.05;
      text-align: center;
      letter-spacing: -.02em;
      margin-bottom: 14px;
    }

    h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      font-family: var(--mono);
      margin-bottom: 48px;
      max-width: 420px;
      line-height: 1.7;
    }

    /* ── INPUT BOX ── */
    .input-wrap {
      width: 100%;
      max-width: 620px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 0;
      transition: border-color .2s;
      overflow: hidden;
    }
    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,255,176,.08);
    }

    .input-prefix {
      padding: 0 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,.03);
      border-right: 1px solid var(--border);
      height: 54px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      user-select: none;
    }

    #url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 0 16px;
      height: 54px;
    }
    #url-input::placeholder { color: var(--muted); }

    .go-btn {
      height: 54px;
      padding: 0 22px;
      background: var(--accent);
      color: #07090f;
      border: none;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .05em;
      cursor: pointer;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .go-btn:hover  { background: #6dffbe; }
    .go-btn:active { transform: scale(.97); }

    /* ── ERROR MSG ── */
    .error-msg {
      display: none;
      margin-top: 12px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--danger);
      letter-spacing: .05em;
    }
    .error-msg.show { display: block; }

    /* ── QUICK LINKS ── */
    .quick-section {
      margin-top: 40px;
      width: 100%;
      max-width: 620px;
    }

    .quick-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .quick-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quick-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      text-decoration: none;
    }
    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .quick-btn img {
      width: 14px; height: 14px;
      border-radius: 2px;
      object-fit: cover;
    }

    /* ── IFRAME MODE ── */
    #frame-wrapper {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      flex-direction: column;
      background: var(--bg);
    }
    #frame-wrapper.active { display: flex; }

    .frame-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .frame-back {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 3px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .frame-back:hover { color: var(--accent); border-color: var(--accent); }

    #frame-url-display {
      flex: 1;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 5px 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .frame-new-tab {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 3px;
      cursor: pointer;
      text-decoration: none;
      transition: color .15s, border-color .15s;
    }
    .frame-new-tab:hover { color: var(--accent2); border-color: var(--accent2); }

    #proxy-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: #fff;
    }

    /* ── LOADING SPINNER ── */
    .spinner-wrap {
      display: none;
      position: absolute;
      inset: 0;
      top: 45px;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 5;
    }
    .spinner-wrap.show { display: flex; }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 20px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      letter-spacing: .08em;
    }
  </style>
</head>
<body>

<div class="page" id="main-page">

  <header>
    <a href="/" class="logo-badge">Budsin Games</a>
    <span class="header-title">proxy // bypass</span>
  </header>

  <main class="hero">
    <div class="tag">modo proxy</div>

    <h1>Accede a<br><span>cualquier sitio</span></h1>

    <p class="subtitle">
      Ingresa la URL y la cargamos a través de nuestro proxy.<br>
      Sin bloqueos. Sin rastros.
    </p>

    <div class="input-wrap" id="input-wrap">
      <span class="input-prefix">URL →</span>
      <input
        type="text"
        id="url-input"
        placeholder="https://chatgpt.com"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
      >
      <button class="go-btn" id="go-btn" onclick="launchProxy()">Ir ↗</button>
    </div>

    <p class="error-msg" id="error-msg">⚠ Ingresa una URL válida (ej: https://chatgpt.com)</p>

    <div class="quick-section">
      <p class="quick-label">Accesos rápidos</p>
      <div class="quick-grid" id="quick-grid">
        <!-- JS las genera -->
      </div>
    </div>
  </main>

  <footer>budsin-games.pages.dev · proxy engine v1</footer>
</div>

<!-- IFRAME FULLSCREEN -->
<div id="frame-wrapper">
  <div class="frame-bar">
    <button class="frame-back" onclick="closeProxy()">← Volver</button>
    <span id="frame-url-display"></span>
    <a class="frame-new-tab" id="frame-new-tab" target="_blank" rel="noopener">Nueva pestaña ↗</a>
  </div>
  <div class="spinner-wrap" id="spinner">
    <div class="spinner"></div>
  </div>
  <iframe
    id="proxy-frame"
    sandbox="allow-forms allow-modals allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-same-origin allow-scripts"
    allow="fullscreen"
    allowfullscreen
  ></iframe>
</div>

<script src="https://budsin-games.pages.dev/classroom-hotkey.js"></script>
<script>
  // ── Quick links ──────────────────────────────────────────
  const QUICK = [
    { label: "ChatGPT",    url: "https://chatgpt.com",          favicon: "https://chatgpt.com/favicon.ico" },
    { label: "YouTube",    url: "https://youtube.com",          favicon: "https://www.youtube.com/favicon.ico" },
    { label: "Wikipedia",  url: "https://es.wikipedia.org",     favicon: "https://es.wikipedia.org/favicon.ico" },
    { label: "Google",     url: "https://google.com",           favicon: "https://google.com/favicon.ico" },
    { label: "DeepL",      url: "https://deepl.com/translator", favicon: "https://deepl.com/favicon.ico" },
    { label: "Coolmaths",  url: "https://coolmathgames.com",    favicon: "https://www.coolmathgames.com/favicon.ico" },
  ];

  const grid = document.getElementById("quick-grid");
  QUICK.forEach(({ label, url, favicon }) => {
    const btn = document.createElement("button");
    btn.className = "quick-btn";
    btn.innerHTML = `<img src="${favicon}" onerror="this.style.display='none'"> ${label}`;
    btn.addEventListener("click", () => launchProxy(url));
    grid.appendChild(btn);
  });

  // ── Proxy launcher ───────────────────────────────────────
  function normalizeUrl(raw) {
    raw = raw.trim();
    if (!raw) return null;
    if (!/^https?:\/\//i.test(raw)) raw = "https://" + raw;
    try { new URL(raw); return raw; } catch (_) { return null; }
  }

  function buildProxyUrl(targetUrl) {
    // Usa la Pages Function: /proxy/<url>
    return "/proxy/" + targetUrl;
  }

  function launchProxy(quickUrl) {
    const raw = quickUrl || document.getElementById("url-input").value;
    const url = normalizeUrl(raw);

    if (!url) {
      const err = document.getElementById("error-msg");
      err.classList.add("show");
      document.getElementById("input-wrap").style.borderColor = "var(--danger)";
      setTimeout(() => {
        err.classList.remove("show");
        document.getElementById("input-wrap").style.borderColor = "";
      }, 2500);
      return;
    }

    const proxyUrl = buildProxyUrl(url);

    // Actualiza barra superior
    document.getElementById("frame-url-display").textContent = url;
    document.getElementById("frame-new-tab").href = proxyUrl;

    // Muestra spinner
    const spinner = document.getElementById("spinner");
    spinner.classList.add("show");

    // Carga iframe
    const frame = document.getElementById("proxy-frame");
    frame.src = "";
    frame.onload = () => spinner.classList.remove("show");
    frame.src = proxyUrl;

    // Abre panel
    document.getElementById("frame-wrapper").classList.add("active");
    document.getElementById("url-input").value = url;
  }

  function closeProxy() {
    document.getElementById("frame-wrapper").classList.remove("active");
    document.getElementById("proxy-frame").src = "";
    document.getElementById("spinner").classList.remove("show");
  }

  // Enter key
  document.getElementById("url-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") launchProxy();
  });

  // Pegar URL desde clipboard -> auto-rellenar
  document.getElementById("url-input").addEventListener("paste", (e) => {
    setTimeout(() => {
      const val = e.target.value.trim();
      if (val.startsWith("http")) e.target.value = val;
    }, 0);
  });
</script>
    <script>
    // Registrar el Service Worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("/sw.js", { scope: "/" })
        .then(() => console.log("✅ Service Worker registrado"))
        .catch((e) => console.error("❌ SW Error:", e));
    }

    function navigate() {
      let input = document.getElementById("url-input").value.trim();

      // Agregar https:// si no tiene protocolo
      if (!input.startsWith("http")) {
        input = "https://" + input;
      }

      // UV encoda la URL y redirige por /service/
      location.href = __uv$config.prefix + __uv$config.encodeUrl(input);
    }

    document.getElementById("url-input")
      .addEventListener("keydown", (e) => {
        if (e.key === "Enter") navigate();
      });
  </script>
</body>
